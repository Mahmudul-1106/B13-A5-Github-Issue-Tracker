<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-Tracker</title>

    <!-- Tailwind and daisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font-awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body class="w-4/12 mx-auto mt-12 p-8 bg-[#F8FAFC] rounded-2xl">

    <div class="text-center mx-auto ">
        <img class="text-center mx-auto" src="./assets/github-logo.png" alt="">
        <h3 class="text-2xl font-semibold text-center mt-5">GitHub Issues Tracker</h3>
        <p class="text-[#64748B] text-center text-xl mb-10">Login to manage your issues</p>
    </div>
    <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-full border p-6">

        <label class="label text-[#1F2937] text-xl">Username</label>
        <input id="username"
            class="input w-full p-6 rounded-xl bg-[#fff] text-sm text-[#64748B] border-2 border-[#E4E4E7]" type="text"
            placeholder="Enter Username: admin" />

        <label class="label text-[#1F2937] text-xl mt-5">Password</label>
        <input id="password"
            class="input w-full p-6 rounded-xl bg-[#fff] text-sm text-[#64748B] border-2 border-[#E4E4E7]"
            type="password" placeholder="Enter Password: admin123" />

        <button onclick="login()" class="btn btn-primary mt-5 w-full p-6 rounded-xl text-xl">Login</button>
    </fieldset>

    <script src="script/login.js"></script>
</body>

</html>
