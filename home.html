<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/issue1.png" type="image/x-icon">

    <title>Github-Issue-Tracker</title>

    <!-- Tailwind and daisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font-awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-[#F8FAFC] mx-auto">
    <header
        class="p-5 flex-col sm:flex-row   flex justify-between items-center bg-[#fff] border-b-[1px] border-[#E9E9E9]">
        <div class="flex flex-col sm:flex-row items-center text-center gap-2">
            <div><img class='w-9' src="./assets/github-logo.png" alt=""></div>
            <h3 class="text-2xl font-semibold">GitHub Issues Tracker</h3>
        </div>
        <div class="flex gap-2">
            <!-- search box -->
            <label class="input">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                        stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input id="search" type="search" required placeholder="Search Issues..." />
            </label>

            <button id="btn-search" class="btn btn-primary"> Search</button>
            <button onclick="logout()" class="btn btn-accent text-white"> Logout</button>
        </div>
    </header>

    <main>
        <!-- Button Section -->
        <section id="btn-section" class="sticky flex-wrap top-[0px] w-11/12 mx-auto p-6 mt-14 bg-[#fff] rounded-lg ">
            <div class="space-x-2">
                <button id="btn-all" class="w-24 btn btn-primary" onclick="displayCondition('btn-all')">All</button>
                <button id="btn-open" class="w-24 btn btn-primary btn-soft"
                    onclick="displayCondition('btn-open')">Open</button>
                <button id="btn-closed" class="w-24 btn btn-primary btn-soft"
                    onclick="displayCondition('btn-closed')">Closed</button>
            </div>
        </section>

        <!-- Spinner -->
        <section id="spinner" class="hidden mx-auto text-center p-10 bg-[#F8FAFC]">
            <span class="loading loading-ring loading-xl"></span>
            <span class="loading loading-ring loading-xl"></span>
            <span class="loading loading-ring loading-xl"></span>
        </section>

        <!-- Issue Count Section -->
        <section id="issue-count-container"
            class="flex flex-col space-y-5 text-center sm:flex-row justify-between sm:text-left items-center w-11/12 mx-auto p-6 mt-4 bg-[#FBFBFB] rounded-lg rounded-b-none shadow-2xl border-[1px] border-t-0 border-[#E9E9E9]">
            <div class="space-x-2 flex gap-2 items-center">
                <img class="p-2 bg-[#ECE4FF] rounded-full" src="./assets/Aperture.png" alt="">
                <div>
                    <h3 class="text-xl font-semibold"><span id="issue-count">50</span> Issues</h3>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-3">
                <p class="flex items-center gap-2"><img class="w-4 h-4" src="./assets/open.png" alt=""> Open</p>
                <p class="flex items-center gap-2"><img class="w-4 h-4" src="./assets/closed.png" alt=""> Closed</p>
            </div>
        </section>


        <!-- Issue container -->
        <section id="issue-container"
            class="w-11/12 mx-auto p-6   grid sm:grid-cols-2 lg:grid-cols-4 gap-4 bg-[#EFEFEF] rounded-t-none  rounded-lg border-[#FBFBFB] shadow-2xl">

        </section>

        <!-- Modal -->
        <!-- Open the modal using ID.showModal() method -->
        <dialog id="my_modal" class="modal modal-bottom sm:modal-middle  space-y-2">

        </dialog>

    </main>

    <script src="./script/home.js"></script>
</body>

</html>
